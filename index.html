<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Pakaian</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  background: black;
  color: white;
  padding: 8px;
  border: none;
  width: 100%;
  margin-top: 5px;
  border-radius: 5px;
}

.cart {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 50px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>🛍️ TOKO PAKAIAN</header>

<div class="container">

<!-- ADMIN -->
<h3>Tambah Produk (Admin)</h3>
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="gambar" placeholder="Link Gambar">
<button class="btn" onclick="tambahProduk()">Tambah Produk</button>

<hr>

<!-- KATALOG -->
<h3>Katalog</h3>
<div class="grid" id="produkList"></div>

</div>

<!-- CART -->
<div class="cart" onclick="checkout()">🛒 Checkout (<span id="totalItem">0</span>)</div>

<script>
let produk = [];
let cart = [];

function tambahProduk() {
  let nama = document.getElementById("nama").value;
  let harga = document.getElementById("harga").value;
  let gambar = document.getElementById("gambar").value;

  produk.push({ nama, harga, gambar });
  tampilkanProduk();
}

function tampilkanProduk() {
  let html = "";
  produk.forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.gambar}">
        <h4>${p.nama}</h4>
        <p>Rp ${p.harga}</p>
        <button class="btn" onclick="tambahCart(${i})">Tambah</button>
      </div>
    `;
  });
  document.getElementById("produkList").innerHTML = html;
}

function tambahCart(i) {
  cart.push(produk[i]);
  document.getElementById("totalItem").innerText = cart.length;
}

function checkout() {
  let text = "Pesanan:%0A";
  cart.forEach((c, i) => {
    text += `${i+1}. ${c.nama} - Rp ${c.harga}%0A`;
  });

  window.open("https://wa.me/62XXXXXXXXXX?text=" + text);
}
</script>

</body>
</html>
