<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Pakaian</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
header { background: black; color: white; padding: 15px; text-align: center; }

.container { padding: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  background: black;
  color: white;
  padding: 8px;
  border: none;
  width: 100%;
  margin-top: 5px;
  border-radius: 5px;
}

.cart-btn {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 50px;
}

.cart-popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  max-height: 70%;
  overflow: auto;
  display: none;
  padding: 10px;
}

.item {
  border-bottom: 1px solid #ddd;
  padding: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>🛍️ TOKO PAKAIAN</header>

<div class="container">

<h3>Tambah Produk (Admin)</h3>
<input id="barcode" placeholder="Barcode">
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="gambar" placeholder="Link Gambar">

<select id="ukuran">
  <option>S</option>
  <option>L</option>
  <option>XL</option>
  <option>XXL</option>
</select>

<input id="warna" placeholder="Warna">

<button class="btn" onclick="tambahProduk()">Tambah Produk</button>

<hr>

<h3>Katalog</h3>
<div class="grid" id="produkList"></div>

</div>

<div class="cart-btn" onclick="bukaCart()">🛒 (<span id="totalItem">0</span>)</div>

<div class="cart-popup" id="cartPopup">
<h3>Keranjang</h3>
<div id="cartList"></div>
<button class="btn" onclick="checkout()">Checkout WA</button>
<button class="btn" onclick="printStruk()">🧾 Print Struk</button>
</div>

<script>
let produk = [];
let cart = [];

function tambahProduk() {
  let barcode = document.getElementById("barcode").value;
  let nama = document.getElementById("nama").value;
  let harga = document.getElementById("harga").value;
  let gambar = document.getElementById("gambar").value;
  let ukuran = document.getElementById("ukuran").value;
  let warna = document.getElementById("warna").value;

  produk.push({ barcode, nama, harga, gambar, ukuran, warna });
  tampilkanProduk();
}

function tampilkanProduk() {
  let html = "";
  produk.forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.gambar}">
        <h4>${p.nama}</h4>
        <small>${p.barcode}</small>
        <p>Rp ${p.harga}</p>
        <small>${p.ukuran} | ${p.warna}</small>
        <button class="btn" onclick="tambahCart(${i})">Tambah</button>
      </div>
    `;
  });
  document.getElementById("produkList").innerHTML = html;
}

function tambahCart(i) {
  cart.push(produk[i]);
  document.getElementById("totalItem").innerText = cart.length;
  tampilkanCart();
}

function tampilkanCart() {
  let html = "";
  cart.forEach((c, i) => {
    html += `
      <div class="item">
        ${c.nama} (${c.ukuran}/${c.warna}) - Rp ${c.harga}<br>
        <small>${c.barcode}</small>
        <button onclick="hapusItem(${i})">❌</button>
      </div>
    `;
  });
  document.getElementById("cartList").innerHTML = html;
}

function hapusItem(i) {
  cart.splice(i,1);
  document.getElementById("totalItem").innerText = cart.length;
  tampilkanCart();
}

function bukaCart() {
  let popup = document.getElementById("cartPopup");
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}

function checkout() {
  let text = "Pesanan:%0A";
  cart.forEach((c, i) => {
    text += `${i+1}. ${c.nama} (${c.ukuran}/${c.warna}) - Rp ${c.harga}%0A`;
  });
  window.open("https://wa.me/6282285712293?text=" + text);
}

function printStruk() {
  let total = 0;
  let isi = "<h3>TOKO PAKAIAN</h3>";
  isi += "<hr>";

  cart.forEach((c) => {
    isi += `${c.nama}<br>`;
    isi += `${c.ukuran}/${c.warna} - Rp ${c.harga}<br>`;
    isi += `<small>${c.barcode}</small><br><br>`;
    total += parseInt(c.harga);
  });

  isi += "<hr>";
  isi += `<b>Total: Rp ${total}</b>`;

  let win = window.open("", "", "width=300,height=500");
  win.document.write(isi);
  win.print();
}
</script>

</body>
</html>
