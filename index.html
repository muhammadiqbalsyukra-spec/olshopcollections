<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Pakaian</title>

<!-- Barcode -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

.container { padding: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  background: #007bff;
  color: white;
  padding: 6px;
  border: none;
  width: 100%;
  margin-top: 5px;
  border-radius: 6px;
  font-size: 13px;
}

.btn:hover {
  background: #0056b3;
}

.cart-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #28a745;
  color: white;
  padding: 10px 14px;
  border-radius: 30px;
  font-size: 14px;
}

/* Overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
}

/* Cart */
.cart-popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  max-height: 70%;
  overflow: auto;
  display: none;
  padding: 15px;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

.item {
  border-bottom: 1px solid #ddd;
  padding: 8px;
}

.close-btn {
  background: red;
  color: white;
  border: none;
  padding: 5px 10px;
  float: right;
  border-radius: 5px;
  font-size: 12px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>🛍️ TOKO PAKAIAN</header>

<div class="container">

<h3>Tambah Produk (Admin)</h3>
<input id="barcode" placeholder="Masukkan angka barcode">
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="gambar" placeholder="Link Gambar">

<select id="ukuran">
  <option>S</option>
  <option>L</option>
  <option>XL</option>
  <option>XXL</option>
</select>

<input id="warna" placeholder="Warna">

<button class="btn" onclick="tambahProduk()">Tambah Produk</button>

<hr>

<h3>Katalog</h3>
<div class="grid" id="produkList"></div>

</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="totalItem">0</span>)
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="tutupCart()"></div>

<!-- CART POPUP -->
<div class="cart-popup" id="cartPopup">
<button class="close-btn" onclick="tutupCart()">Tutup</button>
<h3>Keranjang</h3>

<div id="cartList"></div>

<button class="btn" onclick="checkout()">Checkout WA</button>
<button class="btn" onclick="printStruk()">🧾 Print</button>
</div>

<script>
let produk = [];
let cart = [];

// TAMBAH PRODUK
function tambahProduk() {
  let barcode = document.getElementById("barcode").value;
  let nama = document.getElementById("nama").value;
  let harga = document.getElementById("harga").value;
  let gambar = document.getElementById("gambar").value;
  let ukuran = document.getElementById("ukuran").value;
  let warna = document.getElementById("warna").value;

  produk.push({ barcode, nama, harga, gambar, ukuran, warna });
  tampilkanProduk();

  // reset form
  document.getElementById("barcode").value = "";
  document.getElementById("nama").value = "";
  document.getElementById("harga").value = "";
  document.getElementById("gambar").value = "";
  document.getElementById("warna").value = "";
}

// TAMPILKAN PRODUK
function tampilkanProduk() {
  let html = "";
  produk.forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.gambar}">
        <h4>${p.nama}</h4>
        <svg id="barcode${i}"></svg>
        <p>Rp ${p.harga}</p>
        <small>${p.ukuran} | ${p.warna}</small>
        <button class="btn" onclick="tambahCart(${i})">Tambah</button>
      </div>
    `;
  });

  document.getElementById("produkList").innerHTML = html;

  produk.forEach((p, i) => {
    if(p.barcode){
      JsBarcode("#barcode"+i, p.barcode, { height: 40 });
    }
  });
}

// TAMBAH CART
function tambahCart(i) {
  cart.push(produk[i]);
  document.getElementById("totalItem").innerText = cart.length;
  tampilkanCart();
}

// TAMPILKAN CART
function tampilkanCart() {
  let html = "";
  cart.forEach((c, i) => {
    html += `
      <div class="item">
        ${c.nama} (${c.ukuran}/${c.warna}) - Rp ${c.harga}
        <br><svg id="cartbarcode${i}"></svg>
        <button onclick="hapusItem(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("cartList").innerHTML = html;

  cart.forEach((c, i) => {
    if(c.barcode){
      JsBarcode("#cartbarcode"+i, c.barcode, { height: 30 });
    }
  });
}

// HAPUS ITEM
function hapusItem(i) {
  cart.splice(i,1);
  document.getElementById("totalItem").innerText = cart.length;
  tampilkanCart();
}

// BUKA CART
function toggleCart() {
  document.getElementById("cartPopup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

// TUTUP CART
function tutupCart() {
  document.getElementById("cartPopup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

// CHECKOUT
function checkout() {
  let text = "Pesanan:%0A";
  cart.forEach((c, i) => {
    text += `${i+1}. ${c.nama} (${c.ukuran}/${c.warna}) - Rp ${c.harga}%0A`;
  });

  window.open("https://wa.me/62XXXXXXXXXX?text=" + text);
}

// PRINT STRUK
function printStruk() {
  let total = 0;
  let isi = "<h3>TOKO PAKAIAN</h3><hr>";

  cart.forEach((c) => {
    isi += `${c.nama}<br>`;
    isi += `${c.ukuran}/${c.warna} - Rp ${c.harga}<br>`;
    isi += `${c.barcode}<br><br>`;
    total += parseInt(c.harga);
  });

  isi += "<hr><b>Total: Rp " + total + "</b>";

  let win = window.open("", "", "width=300,height=500");
  win.document.write(isi);
  win.print();
}
</script>

</body>
</html>
