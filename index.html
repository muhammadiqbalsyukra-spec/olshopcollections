<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Pakaian</title>

<!-- Barcode -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

.container { padding: 10px; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  background: #007bff;
  color: white;
  padding: 6px;
  border: none;
  width: 100%;
  margin-top: 5px;
  border-radius: 6px;
  font-size: 13px;
}

.cart-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #28a745;
  color: white;
  padding: 10px 14px;
  border-radius: 30px;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
}

.cart-popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  max-height: 70%;
  overflow: auto;
  display: none;
  padding: 15px;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

.item {
  border-bottom: 1px solid #ddd;
  padding: 8px;
}

.close-btn {
  background: red;
  color: white;
  border: none;
  padding: 5px 10px;
  float: right;
  border-radius: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>🛍️ TOKO PAKAIAN</header>

<div class="container">

<h3>Tambah Produk</h3>
<input id="barcode" placeholder="Barcode">
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="gambar" placeholder="Link Gambar">

<select id="ukuran">
<option>S</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select>

<input id="warna" placeholder="Warna">

<button class="btn" onclick="tambahProduk()">Tambah Produk</button>

<hr>

<h3>Katalog</h3>
<div class="grid" id="produkList"></div>

</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="totalItem">0</span>)
</div>

<div class="overlay" id="overlay" onclick="tutupCart()"></div>

<div class="cart-popup" id="cartPopup">
<button class="close-btn" onclick="tutupCart()">Tutup</button>
<h3>Keranjang</h3>

<div id="cartList"></div>

<button class="btn" onclick="checkout()">Checkout WA</button>
<button class="btn" onclick="printStruk()">🧾 Print</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDruQxhQfsmsDAubunSrohBX9ZALlXtp5E",
  authDomain: "toko-pakaian-91050.firebaseapp.com",
  projectId: "toko-pakaian-91050",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

// TAMBAH PRODUK
function tambahProduk() {
  db.collection("produk").add({
    barcode: barcode.value,
    nama: nama.value,
    harga: harga.value,
    gambar: gambar.value,
    ukuran: ukuran.value,
    warna: warna.value
  });

  barcode.value="";
  nama.value="";
  harga.value="";
  gambar.value="";
  warna.value="";
}

// TAMPILKAN PRODUK
function tampilkanProduk() {
  db.collection("produk").onSnapshot((snapshot)=>{
    let html="";

    snapshot.forEach(doc=>{
      let p = doc.data();

      html+=`
      <div class="card">
        <img src="${p.gambar}">
        <h4>${p.nama}</h4>
        <svg id="b${doc.id}"></svg>
        <p>Rp ${p.harga}</p>
        <small>${p.ukuran} | ${p.warna}</small>
        <button class="btn" onclick='tambahCart(${JSON.stringify(p)})'>Tambah</button>
      </div>`;
    });

    produkList.innerHTML = html;

    snapshot.forEach(doc=>{
      let p = doc.data();
      if(p.barcode){
        JsBarcode("#b"+doc.id, p.barcode);
      }
    });
  });
}

// CART
function tambahCart(p){
  cart.push(p);
  totalItem.innerText = cart.length;
  tampilkanCart();
}

function tampilkanCart(){
  let html="";
  cart.forEach((c,i)=>{
    html+=`
    <div class="item">
      ${c.nama} - Rp ${c.harga}
      <button onclick="hapusItem(${i})">❌</button>
    </div>`;
  });
  cartList.innerHTML = html;
}

function hapusItem(i){
  cart.splice(i,1);
  totalItem.innerText = cart.length;
  tampilkanCart();
}

function toggleCart(){
  cartPopup.style.display="block";
  overlay.style.display="block";
}

function tutupCart(){
  cartPopup.style.display="none";
  overlay.style.display="none";
}

// CHECKOUT
function checkout(){
  let text="Pesanan:%0A";
  cart.forEach((c,i)=>{
    text+=`${i+1}. ${c.nama} - Rp ${c.harga}%0A`;
  });
  window.open("https://wa.me/6282285712293?text="+text);
}

// PRINT
function printStruk(){
  let total=0;
  let isi="TOKO PAKAIAN<hr>";

  cart.forEach(c=>{
    isi+=`${c.nama} - Rp ${c.harga}<br>`;
    total+=parseInt(c.harga);
  });

  isi+=`<hr>Total: Rp ${total}`;

  let w=window.open("","","width=300,height=500");
  w.document.write(isi);
  w.print();
}

// LOAD DATA
tampilkanProduk();
</script>

</body>
</html>
